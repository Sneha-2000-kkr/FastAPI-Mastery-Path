version: "3.9"

services:
  app:
    build:
      context: ../..
      dockerfile: modules/module_14_docker_deployment/deploy/Dockerfile
    image: fapi-app:latest
    ports:
      - "8000:8000"
    environment:
      APP_DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
